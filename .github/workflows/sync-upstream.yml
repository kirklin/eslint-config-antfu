name: Sync Upstream

on:
  schedule:
    # Run daily at 08:00 UTC (16:00 CST)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/antfu/eslint-config.git || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_COMMITS=$(git rev-list HEAD..upstream/main --count)
          echo "count=$UPSTREAM_COMMITS" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_COMMITS" -eq 0 ]; then
            echo "✅ Already up to date with upstream."
          else
            echo "🔄 Found $UPSTREAM_COMMITS new upstream commit(s)."
          fi

      - name: Rebase onto upstream
        if: steps.check.outputs.count != '0'
        id: rebase
        run: |
          if git rebase upstream/main; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Rebase succeeded cleanly."
          else
            git rebase --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "⚠️ Rebase had conflicts, aborting."
          fi

      - name: Push rebased main
        if: steps.check.outputs.count != '0' && steps.rebase.outputs.status == 'success'
        run: git push origin main --force-with-lease

      # If rebase fails due to conflicts, fall back to creating a PR
      - name: Fallback — create merge PR on conflict
        if: steps.check.outputs.count != '0' && steps.rebase.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"

          # Clean state
          git checkout main
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git branch -D "$BRANCH" 2>/dev/null || true

          # Create branch and merge (with conflict markers)
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true
          git add -A
          git commit --no-edit -m "chore: merge upstream (conflicts need manual resolution)" || true
          git push origin "$BRANCH"

          # Close stale sync PRs
          EXISTING_PRS=$(gh pr list --head "sync/upstream-" --state open --json number --jq '.[].number')
          for pr in $EXISTING_PRS; do
            gh pr close "$pr" --comment "Superseded by a newer sync PR." || true
          done

          gh pr create \
            --title "chore: sync upstream — rebase conflict ($(date +%Y-%m-%d))" \
            --body "⚠️ **Auto-rebase failed due to conflicts** — manual resolution required.

          This PR merges the latest changes from [upstream (antfu/eslint-config)](https://github.com/antfu/eslint-config).

          **Upstream commits:** ${{ steps.check.outputs.count }}

          > Auto-generated by [Sync Upstream](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --base main \
            --head "$BRANCH" \
            --label "upstream-sync" || true
